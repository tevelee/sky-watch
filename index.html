<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sky Watch · Taraliget</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --bg:    #080c14;
      --card:  #0c1220;
      --bdr:   #1a2540;
      --blue:  #3b82f6;
      --amber: #f59e0b;
      --green: #10b981;
      --text:  #e2e8f0;
      --muted: #94a3b8;
      --dim:   #475569;
      --mono:  'SF Mono','Fira Code','Cascadia Code',monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--card); border-bottom: 1px solid var(--bdr);
      padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-title { font-size: 19px; font-weight: 700; letter-spacing: -.3px; }
    .logo-sub { font-size: 12px; color: var(--dim); }
    .live { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: blink 2s ease-in-out infinite; }
    .dot.err { background: #ef4444; animation: none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Weather strip ── */
    #weather {
      background: #0a1019; border-bottom: 1px solid var(--bdr);
      padding: 8px 20px; display: flex; gap: 20px; overflow-x: auto; flex-shrink: 0;
      font-size: 12px; color: var(--muted);
    }
    .w { display: flex; align-items: center; gap: 4px; white-space: nowrap; }

    /* ── Settings bar ── */
    #settings {
      background: #090d19; border-bottom: 1px solid var(--bdr);
      padding: 7px 20px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; flex-shrink: 0;
      font-size: 11.5px; color: var(--dim);
    }
    .setting-group { display: flex; align-items: center; gap: 6px; }
    #home-coords { color: var(--muted); font-family: var(--mono); font-size: 11px; }
    .drag-hint { font-size: 10px; color: var(--dim); font-style: italic; }
    .radius-btn {
      background: #111827; border: 1px solid var(--bdr);
      color: var(--dim); font-size: 10.5px; padding: 2px 8px;
      border-radius: 4px; cursor: pointer; transition: all .15s;
    }
    .radius-btn:hover { border-color: var(--blue); color: var(--blue); }
    .radius-btn.active { background: #1e3a5f; border-color: var(--blue); color: var(--blue); }

    /* ── Main grid ── */
    .grid {
      display: grid; grid-template-columns: 380px 1fr; grid-template-rows: auto 1fr;
      gap: 12px; padding: 12px 14px; flex: 1; min-height: 0;
    }
    @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }

    /* ── Cards ── */
    .card {
      background: var(--card); border: 1px solid var(--bdr); border-radius: 12px;
      padding: 16px; display: flex; flex-direction: column;
    }
    .card-title {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1.8px; color: var(--dim); margin-bottom: 12px;
    }

    /* ── Overhead card ── */
    .overhead { grid-row: 1; }
    .plane-photo {
      width: 100%; height: 150px; object-fit: cover;
      border-radius: 8px; margin-bottom: 12px; background: #0a0e1a;
    }
    .photo-ph {
      width: 100%; height: 80px; border-radius: 8px;
      background: linear-gradient(135deg,#0a0e1a,#111827);
      display: flex; align-items: center; justify-content: center;
      font-size: 44px; margin-bottom: 12px;
    }
    .callsign {
      font-family: var(--mono); font-size: 30px; font-weight: 700;
      letter-spacing: 3px; color: #f0f9ff; line-height: 1;
    }
    .op-name  { font-size: 13px; color: var(--blue); margin: 4px 0 2px; }
    .ac-model { font-size: 11.5px; color: var(--muted); margin-bottom: 12px; }

    .route-bar {
      display: flex; align-items: center; gap: 8px;
      background: #0a0e1a; border-radius: 8px; padding: 9px 12px; margin-bottom: 12px;
    }
    .ap { text-align: center; }
    .ap-code { font-family: var(--mono); font-size: 18px; font-weight: 700; color: #f0f9ff; line-height: 1; }
    .ap-name { font-size: 9px; color: var(--dim); margin-top: 2px; }
    .route-mid { flex: 1; display: flex; align-items: center; }
    .route-line { flex: 1; height: 1px; background: var(--bdr); }
    .route-plane { font-size: 14px; margin: 0 5px; }

    .sec-label {
      font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--dim); margin: 10px 0 7px;
    }
    .stats {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 10px;
    }
    .stat { background: #0a0e1a; border-radius: 8px; padding: 9px 11px; }
    .stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin-bottom: 3px; }
    .stat-value { font-family: var(--mono); font-size: 17px; font-weight: 600; color: var(--text); line-height: 1; }
    .stat-sub   { font-size: 10px; color: var(--dim); margin-top: 2px; }

    .badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .badge {
      font-size: 10.5px; padding: 2px 7px; border-radius: 4px;
      background: #111827; border: 1px solid var(--bdr); color: var(--muted); white-space: nowrap;
    }
    .badge.hi { border-color: var(--amber); color: var(--amber); background: #1c1400; }

    /* ── Map card ── */
    .map-card {
      grid-column: 2; grid-row: 1 / 3; padding: 13px; min-height: 480px;
      display: flex; flex-direction: column;
    }
    #map { flex: 1; border-radius: 8px; overflow: hidden; min-height: 400px; }

    /* ── Queue card ── */
    .queue { grid-row: 2; overflow: hidden; }
    .fl-row {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 0; border-bottom: 1px solid var(--bdr);
    }
    .fl-row:last-child { border-bottom: none; }
    .fl-tag {
      font-size: 9px; font-weight: 700; padding: 2px 6px;
      border-radius: 4px; text-transform: uppercase; white-space: nowrap;
    }
    .tag-near    { background: #052e16; color: var(--green); }
    .tag-arr     { background: #0f1f3d; color: #60a5fa; }
    .tag-dep     { background: #1c1400; color: var(--amber); }
    .tag-transit { background: #1a0f2e; color: #a78bfa; }
    .tag-far     { background: #12161f; color: var(--dim); }

    .fl-info { flex: 1; min-width: 0; }
    .fl-cs { font-family: var(--mono); font-size: 12.5px; font-weight: 600; }
    .fl-al { font-size: 10.5px; color: var(--dim); }
    .fl-right { text-align: right; flex-shrink: 0; }
    .fl-eta { font-size: 12px; font-weight: 700; color: var(--amber); font-family: var(--mono); }
    .fl-alt { font-family: var(--mono); font-size: 11.5px; }
    .fl-spd { font-size: 10px; color: var(--dim); }

    /* ── States ── */
    .empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--dim); gap: 8px; padding: 24px; text-align: center;
    }
    .empty .icon { font-size: 36px; opacity: .35; }
    .empty p { font-size: 12.5px; }
  </style>
</head>

/* ─── Utilities ─── */
function haversine(la1, lo1, la2, lo2) {
  const R = 6371, r = Math.PI/180;
  const a = Math.sin((la2-la1)*r/2)**2 + Math.cos(la1*r)*Math.cos(la2*r)*Math.sin((lo2-lo1)*r/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function bearing(la1, lo1, la2, lo2) {
  const r = Math.PI/180;
  const y = Math.sin((lo2-lo1)*r)*Math.cos(la2*r);
  const x = Math.cos(la1*r)*Math.sin(la2*r) - Math.sin(la1*r)*Math.cos(la2*r)*Math.cos((lo2-lo1)*r);
  return (Math.atan2(y,x)*180/Math.PI + 360) % 360;
}
function bearingDiff(a, b) { return Math.abs((a-b+540)%360-180); }

const ftToM    = ft  => Math.round(ft * 0.3048);
const ktsToKmh = kt  => Math.round(kt * 1.852);
const fpmToMpm = fpm => Math.round(Math.abs(fpm) * 0.3048);

function altStr(ft) {
  if (!ft) return '—';
  const m = ftToM(ft);
  return m >= 1000 ? (m/1000).toFixed(1) + ' km' : m.toLocaleString() + ' m';
}
function altM(ft) { return ft ? ftToM(ft) : null; }

function headingCard(deg) {
  return ['N','NE','E','SE','S','SW','W','NW'][Math.round(((deg%360)+360)%360/45)%8];
}
function airlineName(cs) {
  if (!cs) return null;
  return AIRLINES[cs.slice(0,3).toUpperCase()] || AIRLINES[cs.slice(0,2).toUpperCase()] || null;
}
function aircraftInfo(code) { return code ? AIRCRAFT[code.toUpperCase()] : null; }

function vertStr(vr) {
  if (!vr) return '';
  if (vr >  200) return `↑ ${fpmToMpm(vr)} m/min`;
  if (vr < -200) return `↓ ${fpmToMpm(vr)} m/min`;
  return '→ Level';
}

function classifyBUD(p) {
  const m = altM(p.baro_alt) || 0;
  const vr = p.vert_rate || 0;
  const d  = haversine(p.lat, p.lon, BUD.lat, BUD.lon);
  if (d < 120 && vr < -200 && m < 9500) return 'arriving';
  if (d < 90  && vr >  400 && m < 8000) return 'departing';
  if (m > 9000) return 'transit';
  return 'other';
}

// Closest Point of Approach — returns minutes until overhead (<= 6 km), or null
function etaOverhead(p) {
  if (!p.lat || !p.lon || !p.velocity || !p.heading) return null;
  const spKmMin = ktsToKmh(p.velocity) / 60;
  const hdg     = p.heading * Math.PI / 180;
  const vE = spKmMin * Math.sin(hdg);
  const vN = spKmMin * Math.cos(hdg);
  const cosLat = Math.cos(HOME.lat * Math.PI / 180);
  const dE = (p.lon - HOME.lon) * 111.32 * cosLat;
  const dN = (p.lat - HOME.lat) * 110.57;
  const denom = vE*vE + vN*vN;
  if (!denom) return null;
  const t = -(dE*vE + dN*vN) / denom;
  if (t < 0.3 || t > 60) return null;
  const cpaDist = Math.sqrt((dE+vE*t)**2 + (dN+vN*t)**2);
  if (cpaDist > 6) return null;
  return Math.round(t);
}

// Draggable home marker
const homeIcon = L.divIcon({
  html: '<div style="width:14px;height:14px;background:#f59e0b;border-radius:50%;border:2px solid #fff;box-shadow:0 0 8px #f59e0b88;cursor:grab;" title="Drag to set location"></div>',
  iconSize:[14,14], iconAnchor:[7,7], className:'',
});
const homeMarker = L.marker([HOME.lat, HOME.lon], { icon: homeIcon, draggable: true })
  .bindTooltip('Drag to set your location', { permanent: false, direction: 'top' })
  .addTo(map);

// Scan-radius circle
const homeCircle = L.circle([HOME.lat, HOME.lon], {
  radius: SCAN_KM * 1000, color:'#f59e0b', weight:1, fillOpacity:.03, dashArray:'5,7',
}).addTo(map);

homeMarker.on('dragend', function(e) {
  const ll   = e.target.getLatLng();
  HOME.lat   = Math.round(ll.lat * 10000) / 10000;
  HOME.lon   = Math.round(ll.lng * 10000) / 10000;
  HOME.name  = 'Custom';
  homeCircle.setLatLng([HOME.lat, HOME.lon]);
  saveConfig();
  updateSettingsUI();
  refresh();
});

let planeLayer = L.layerGroup().addTo(map);
let routeLayer = L.layerGroup().addTo(map);

function planeIcon(hdg, hi) {
  const c = hi ? '#f59e0b' : '#3b82f6';
  const s = hi ? 22 : 16;
  return L.divIcon({
    html: `<div style="font-size:${s}px;color:${c};transform:rotate(${hdg}deg);line-height:1;filter:drop-shadow(0 0 3px ${c}44);">✈</div>`,
    iconSize:[s,s], iconAnchor:[s/2,s/2], className:'',
    zIndexOffset: hi ? 500 : 0,
  });
}

function updateMap(planes) {
  planeLayer.clearLayers();
  routeLayer.clearLayers();
  planes.forEach((p, i) => {
    const hi = i === 0;
    L.marker([p.lat, p.lon], { icon: planeIcon(p.heading||0, hi) })
      .bindPopup(`<b>${p.callsign || p.icao24}</b><br>${altStr(p.baro_alt)} · ${p.velocity ? ktsToKmh(p.velocity)+' km/h' : '?'}${p._al ? '<br>'+p._al : ''}`)
      .addTo(planeLayer);
    if (hi) {
      L.polyline([[p.lat,p.lon],[BUD.lat,BUD.lon]], {
        color:'#f59e0b', weight:1, dashArray:'4,8', opacity:.35,
      }).addTo(routeLayer);
    }
  });
}

/* ─── API ─── */
async function fetchFlights() {
  const nm = Math.max(10, Math.round(SCAN_KM / 1.852));
  const urls = [
    `https://api.airplanes.live/v2/point/${HOME.lat}/${HOME.lon}/${nm}`,
    `https://opendata.adsb.fi/api/v2/lat/${HOME.lat}/lon/${HOME.lon}/dist/${nm}`,
  ];
  let last;
  for (const url of urls) {
    try {
      const r = await fetch(url);
      if (!r.ok) { last = new Error(`HTTP ${r.status}`); continue; }
      const d = await r.json();
      return (d.ac || []).map(a => ({
        icao24:    a.hex,
        callsign:  a.flight?.trim() || null,
        lon: a.lon, lat: a.lat,
        baro_alt:  a.alt_baro === 'ground' ? 0 : (a.alt_baro || 0),
        on_ground: a.alt_baro === 'ground',
        velocity:  a.gs    || 0,
        heading:   a.track || 0,
        vert_rate: a.baro_rate || 0,
        squawk:    a.squawk,
        type_code: a.t    || null,
        reg:       a.r    || null,
        operator:  a.oper || null,
      }));
    } catch(e) { last = e; }
  }
  throw last || new Error('All APIs failed');
}

async function fetchPhoto(reg) {
  if (!reg) return null;
  if (photoCache.has(reg)) return photoCache.get(reg);
  try {
    const r = await fetch(`https://api.planespotters.net/pub/photos/reg/${reg}`);
    if (r.ok) {
      const d = await r.json();
      const url = d.photos?.[0]?.thumbnail_large?.src || d.photos?.[0]?.thumbnail?.src || null;
      photoCache.set(reg, url); return url;
    }
  } catch(e) {}
  photoCache.set(reg, null); return null;
}

async function fetchWeather() {
  const r = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${HOME.lat}&longitude=${HOME.lon}` +
    `&current=temperature_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m,weather_code,visibility,cloud_cover&wind_speed_unit=kmh`
  );
  if (!r.ok) throw new Error('Weather failed');
  return (await r.json()).current;
}

/* ─── Renderers ─── */
function renderWeather(w) {
  const desc  = WMO[w.weather_code] || 'Unknown';
  const dirs  = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  const wdir  = dirs[Math.round(w.wind_direction_10m/22.5)%16];
  const vis   = w.visibility >= 10000 ? '10+ km' : (w.visibility/1000).toFixed(1)+' km';
  document.getElementById('weather').innerHTML = `
    <div class="w">🌡️ ${w.temperature_2m}°C</div>
    <div class="w">🌤️ ${desc}</div>
    <div class="w">☁️ ${w.cloud_cover}%</div>
    <div class="w">💧 ${w.relative_humidity_2m}%</div>
    <div class="w">💨 ${w.wind_speed_10m} km/h ${wdir}</div>
    <div class="w">👁 ${vis}</div>`;
}

function renderOverhead(p) {
  const m     = altM(p.baro_alt);
  const kmh   = p.velocity ? ktsToKmh(p.velocity) : null;
  const ac    = aircraftInfo(p.type_code);
  const model = ac?.name || p.type_code || 'Unknown type';
  const op    = airlineName(p.callsign) || p.operator || '—';
  const reg   = p.reg;
  const pax   = ac?.pax;
  const vert  = vertStr(p.vert_rate);
  const dist  = p._dist ? `${Math.round(p._dist)} km away` : '';

  const acSpecs = (ac?.ws) ? `
    <div class="sec-label">Airframe</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Wingspan</div>
        <div class="stat-value">${ac.ws}</div>
        <div class="stat-sub">m</div>
      </div>
      <div class="stat">
        <div class="stat-label">Length</div>
        <div class="stat-value">${ac.len}</div>
        <div class="stat-sub">m</div>
      </div>
      <div class="stat">
        <div class="stat-label">Engines</div>
        <div class="stat-value">${ac.eng}</div>
        <div class="stat-sub">${ac.eng === 1 ? 'turboprop' : ac.eng > 2 ? 'turbofans' : 'turbofans'}</div>
      </div>
    </div>` : '';

  document.getElementById('overhead').innerHTML = `
    <div class="photo-ph" id="photo-box">✈️</div>
    <div class="callsign">${p.callsign || p.icao24.toUpperCase()}</div>
    <div class="op-name">${op}</div>
    <div class="ac-model">${model}${reg ? ' · ' + reg : ''}</div>

    <div class="route-bar">
      <div class="ap"><div class="ap-code">–</div><div class="ap-name">Origin</div></div>
      <div class="route-mid"><div class="route-line"></div><div class="route-plane">✈</div><div class="route-line"></div></div>
      <div class="ap"><div class="ap-code">–</div><div class="ap-name">Destination</div></div>
    </div>

    <div class="sec-label">In flight</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Altitude</div>
        <div class="stat-value">${m ? m.toLocaleString() : '—'}</div>
        <div class="stat-sub">${m ? 'm' : ''}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Speed</div>
        <div class="stat-value">${kmh ?? '—'}</div>
        <div class="stat-sub">${kmh ? 'km/h' : ''}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Heading</div>
        <div class="stat-value">${p.heading ? Math.round(p.heading)+'°' : '—'}</div>
        <div class="stat-sub">${p.heading ? headingCard(p.heading) : ''}</div>
      </div>
    </div>

    ${acSpecs}

    <div class="badges">
      ${pax  ? `<span class="badge hi">👥 ~${pax} passengers</span>` : ''}
      ${dist ? `<span class="badge">📍 ${dist}</span>` : ''}
      ${vert ? `<span class="badge">${vert}</span>` : ''}
      ${p.type_code ? `<span class="badge">🛩 ${p.type_code}</span>` : ''}
      ${p.squawk    ? `<span class="badge">📡 ${p.squawk}</span>`    : ''}
      ${m && m > 8500 ? '<span class="badge">☁️ Cruising</span>'      : ''}
      ${m && m < 1500 ? '<span class="badge">🛬 Low approach</span>'  : ''}
    </div>`;

  fetchPhoto(reg).then(url => {
    if (!url) return;
    const box = document.getElementById('photo-box');
    if (box) box.outerHTML = `<img class="plane-photo" src="${url}" alt="Aircraft" onerror="this.remove()">`;
  });
}

const BUD_TAG = {
  arriving:  { css:'tag-arr',     label:'Arriving BUD'  },
  departing: { css:'tag-dep',     label:'Departing BUD' },
  transit:   { css:'tag-transit', label:'High transit'  },
};

function renderQueue(planes) {
  if (!planes.length) {
    document.getElementById('queue').innerHTML =
      '<div class="empty"><div class="icon">🌙</div><p>No airborne traffic nearby</p></div>';
    return;
  }
  document.getElementById('queue').innerHTML = planes.map(p => {
    const al    = airlineName(p.callsign) || p.operator || '—';
    const m     = p.baro_alt ? ftToM(p.baro_alt) : null;
    const kmh   = p.velocity ? ktsToKmh(p.velocity) : null;
    const eta   = p._eta;
    const bt    = BUD_TAG[p._bud];
    const close = p._dist <= 15;

    let tagCss, tagLabel;
    if (close)     { tagCss = 'tag-near'; tagLabel = Math.round(p._dist)+' km'; }
    else if (bt)   { tagCss = bt.css;     tagLabel = bt.label; }
    else           { tagCss = 'tag-far';  tagLabel = Math.round(p._dist)+' km'; }

    return `
      <div class="fl-row">
        <span class="fl-tag ${tagCss}">${tagLabel}</span>
        <div class="fl-info">
          <div class="fl-cs">${p.callsign || p.icao24.toUpperCase()}</div>
          <div class="fl-al">${al}</div>
        </div>
        <div class="fl-right">
          ${eta !== null ? `<div class="fl-eta">⏱ ${eta < 1 ? 'overhead now' : 'in '+eta+' min'}</div>` : ''}
          <div class="fl-alt">${m ? m.toLocaleString()+' m' : '—'}</div>
          <div class="fl-spd">${kmh ? kmh+' km/h' : ''}</div>
        </div>
      </div>`;
  }).join('');
}

/* ─── Countdown ─── */
let countdown = REFRESH_S, cdTimer = null;
function startCountdown() {
  clearInterval(cdTimer);
  countdown = REFRESH_S;
  cdTimer = setInterval(() => {
    countdown--;
    const el = document.getElementById('status-label');
    if (el && countdown > 0) el.textContent = `Refreshes in ${countdown}s`;
  }, 1000);
}

/* ─── Main loop ─── */
async function refresh() {
  document.getElementById('dot').className = 'dot';
  document.getElementById('status-label').textContent = 'Fetching…';
  try {
    const planes = await fetchFlights();

    planes.forEach(p => {
      p._dist = (p.lat && p.lon) ? haversine(HOME.lat, HOME.lon, p.lat, p.lon) : Infinity;
      p._al   = airlineName(p.callsign);
      p._bud  = (p.lat && p.lon) ? classifyBUD(p) : 'other';
      p._eta  = (!p.on_ground && p.lat && p.lon) ? etaOverhead(p) : null;
    });

    const airborne = planes
      .filter(p => !p.on_ground && p.lat && p.lon && p.baro_alt > 100)
      .sort((a, b) => a._dist - b._dist);

    updateMap(airborne);
    renderQueue(airborne.slice(0, 12));

    if (airborne.length) {
      renderOverhead(airborne[0]);
    } else {
      document.getElementById('overhead').innerHTML =
        '<div class="empty"><div class="icon">🌙</div><p>No aircraft detected nearby</p></div>';
    }

    const now = new Date().toLocaleTimeString('hu-HU', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    document.getElementById('status-label').textContent = `Updated ${now}`;
    document.getElementById('dot').className = 'dot';
    startCountdown();
  } catch(e) {
    console.error(e);
    document.getElementById('dot').className = 'dot err';
    document.getElementById('status-label').textContent = 'Error — retrying in 60s';
    document.getElementById('overhead').innerHTML =
      '<div class="empty"><div class="icon">⚠️</div><p>Could not reach flight API.<br>Will retry shortly.</p></div>';
  }
}

async function refreshWeather() {
  try { renderWeather(await fetchWeather()); } catch(e) {}
}

/* ─── Settings UI ─── */
function updateSettingsUI() {
  document.getElementById('home-coords').textContent =
    `${HOME.lat.toFixed(4)}°N, ${HOME.lon.toFixed(4)}°E`;
  document.getElementById('loc-name').textContent = HOME.name;
  document.querySelectorAll('.radius-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.km) === SCAN_KM);
  });
}

document.querySelectorAll('.radius-btn').forEach(b => {
  b.addEventListener('click', () => {
    SCAN_KM = parseInt(b.dataset.km);
    homeCircle.setRadius(SCAN_KM * 1000);
    saveConfig();
    updateSettingsUI();
    refresh();
  });
});

/* ─── Boot ─── */
updateSettingsUI();
refreshWeather();
refresh();
setInterval(refresh, REFRESH_S * 1000);
setInterval(refreshWeather, 5 * 60 * 1000);
</script>
